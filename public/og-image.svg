<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#3b1f6e"/>
      <stop offset="100%" stop-color="#4a1942"/>
    </linearGradient>
    <linearGradient id="pill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <linearGradient id="card3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="card4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
    <filter id="iconshadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Soft glow blobs -->
  <circle cx="200" cy="150" r="180" fill="#6366f1" opacity="0.12"/>
  <circle cx="1050" cy="480" r="200" fill="#f472b6" opacity="0.1"/>
  <circle cx="600" cy="600" r="150" fill="#a78bfa" opacity="0.08"/>

  <!-- Floating game cards (top-right) -->
  <!-- Card 1 - Memory (brain) -->
  <rect x="790" y="55" width="130" height="130" rx="24" fill="url(#card1)" opacity="0.9" filter="url(#shadow)" transform="rotate(-8 855 120)"/>
  <g transform="translate(855,120) rotate(-8) translate(-26,-26) scale(0.101)" fill="white" opacity="0.95" filter="url(#iconshadow)">
    <path d="M120 56c0-30.9 25.1-56 56-56l24 0c17.7 0 32 14.3 32 32l0 448c0 17.7-14.3 32-32 32l-32 0c-29.8 0-54.9-20.4-62-48-.7 0-1.3 0-2 0-44.2 0-80-35.8-80-80 0-18 6-34.6 16-48-19.4-14.6-32-37.8-32-64 0-30.9 17.6-57.8 43.2-71.1-7.1-12-11.2-26-11.2-40.9 0-44.2 35.8-80 80-80l0-24zm272 0l0 24c44.2 0 80 35.8 80 80 0 15-4.1 29-11.2 40.9 25.7 13.3 43.2 40.1 43.2 71.1 0 26.2-12.6 49.4-32 64 10 13.4 16 30 16 48 0 44.2-35.8 80-80 80-.7 0-1.3 0-2 0-7.1 27.6-32.2 48-62 48l-32 0c-17.7 0-32-14.3-32-32l0-448c0-17.7 14.3-32 32-32l24 0c30.9 0 56 25.1 56 56z"/>
  </g>

  <!-- Card 2 - Bubble Pop (bullseye) -->
  <rect x="950" y="90" width="130" height="130" rx="24" fill="url(#card2)" opacity="0.9" filter="url(#shadow)" transform="rotate(6 1015 155)"/>
  <g transform="translate(1015,155) rotate(6) translate(-26,-26) scale(0.101)" fill="white" opacity="0.95">
    <path d="M448 256a192 192 0 1 0 -384 0 192 192 0 1 0 384 0zM0 256a256 256 0 1 1 512 0 256 256 0 1 1 -512 0zm256 80a80 80 0 1 0 0-160 80 80 0 1 0 0 160zm0-224a144 144 0 1 1 0 288 144 144 0 1 1 0-288zM224 256a32 32 0 1 1 64 0 32 32 0 1 1 -64 0z"/>
  </g>

  <!-- Card 3 - Ball Sort (flask) -->
  <rect x="860" y="210" width="120" height="120" rx="22" fill="url(#card3)" opacity="0.85" filter="url(#shadow)" transform="rotate(-4 920 270)"/>
  <g transform="translate(920,270) rotate(-4) translate(-22.4,-25.6) scale(0.088)" fill="white" opacity="0.95">
    <path d="M288 0L128 0C110.3 0 96 14.3 96 32s14.3 32 32 32L128 215.5 7.5 426.3C2.6 435 0 444.7 0 454.7 0 486.4 25.6 512 57.3 512l333.4 0c31.6 0 57.3-25.6 57.3-57.3 0-10-2.6-19.8-7.5-28.4L320 215.5 320 64c17.7 0 32-14.3 32-32S337.7 0 320 0L288 0zM192 215.5l0-151.5 64 0 0 151.5c0 11.1 2.9 22.1 8.4 31.8l41.6 72.7-164 0 41.6-72.7c5.5-9.7 8.4-20.6 8.4-31.8z"/>
  </g>

  <!-- Card 4 - Tower Defense (shield) -->
  <rect x="1005" y="248" width="115" height="115" rx="20" fill="url(#card4)" opacity="0.85" filter="url(#shadow)" transform="rotate(10 1062 305)"/>
  <g transform="translate(1062,305) rotate(10) translate(-25.6,-25.6) scale(0.1)" fill="white" opacity="0.95">
    <path d="M256 0c4.6 0 9.2 1 13.4 2.9L457.8 82.8c22 9.3 38.4 31 38.3 57.2-.5 99.2-41.3 280.7-213.6 363.2-16.7 8-36.1 8-52.8 0-172.4-82.5-213.1-264-213.6-363.2-.1-26.2 16.3-47.9 38.3-57.2L242.7 2.9C246.9 1 251.4 0 256 0z"/>
  </g>

  <!-- Controller logo mark -->
  <rect x="96" y="220" width="96" height="96" rx="22" fill="url(#pill)" opacity="0.95" filter="url(#shadow)"/>
  <g transform="translate(96,220)">
    <!-- Controller body -->
    <rect x="14" y="30" width="68" height="34" rx="17" fill="white" opacity="0.95"/>
    <rect x="14" y="49" width="20" height="19" rx="9" fill="white" opacity="0.95"/>
    <rect x="62" y="49" width="20" height="19" rx="9" fill="white" opacity="0.95"/>
    <!-- D-pad -->
    <rect x="22" y="41" width="14" height="5" rx="2.5" fill="#6366f1"/>
    <rect x="27" y="36" width="5" height="14" rx="2.5" fill="#6366f1"/>
    <!-- Face buttons -->
    <circle cx="64" cy="37" r="3" fill="#f87171"/>
    <circle cx="71" cy="44" r="3" fill="#4ade80"/>
    <circle cx="57" cy="44" r="3" fill="#60a5fa"/>
    <circle cx="64" cy="51" r="3" fill="#facc15"/>
    <!-- Center buttons -->
    <rect x="42" y="43" width="5" height="4" rx="2" fill="rgba(99,102,241,0.6)"/>
    <rect x="49" y="43" width="5" height="4" rx="2" fill="rgba(99,102,241,0.6)"/>
  </g>

  <!-- Main title -->
  <text x="216" y="285" font-family="'Inter', system-ui, sans-serif" font-size="72" font-weight="900" fill="white" filter="url(#shadow)">DaniB's Games</text>

  <!-- Subtitle pill -->
  <rect x="96" y="308" width="370" height="48" rx="24" fill="url(#pill)" opacity="0.9"/>
  <text x="281" y="339" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="22" font-weight="700" fill="white">Free games for the whole family</text>

  <!-- Game name pills (bottom) -->
  <g font-family="'Inter', system-ui, sans-serif" font-size="20" font-weight="600">
    <!-- Icons in pills using FA paths scaled small -->
    <!-- Memory Game pill -->
    <rect x="96" y="404" width="182" height="44" rx="22" fill="rgba(99,102,241,0.3)" stroke="#6366f1" stroke-width="1.5"/>
    <g transform="translate(117,426) scale(0.032) translate(-256,-256)" fill="#a78bfa">
      <path d="M120 56c0-30.9 25.1-56 56-56l24 0c17.7 0 32 14.3 32 32l0 448c0 17.7-14.3 32-32 32l-32 0c-29.8 0-54.9-20.4-62-48-.7 0-1.3 0-2 0-44.2 0-80-35.8-80-80 0-18 6-34.6 16-48-19.4-14.6-32-37.8-32-64 0-30.9 17.6-57.8 43.2-71.1-7.1-12-11.2-26-11.2-40.9 0-44.2 35.8-80 80-80l0-24zm272 0l0 24c44.2 0 80 35.8 80 80 0 15-4.1 29-11.2 40.9 25.7 13.3 43.2 40.1 43.2 71.1 0 26.2-12.6 49.4-32 64 10 13.4 16 30 16 48 0 44.2-35.8 80-80 80-.7 0-1.3 0-2 0-7.1 27.6-32.2 48-62 48l-32 0c-17.7 0-32-14.3-32-32l0-448c0-17.7 14.3-32 32-32l24 0c30.9 0 56 25.1 56 56z"/>
    </g>
    <text x="186" y="431" text-anchor="middle" fill="white">Memory Game</text>

    <!-- Ball Sort pill -->
    <rect x="292" y="404" width="148" height="44" rx="22" fill="rgba(6,182,212,0.3)" stroke="#06b6d4" stroke-width="1.5"/>
    <g transform="translate(312,426) scale(0.030) translate(-224,-256)" fill="#67e8f9">
      <path d="M288 0L128 0C110.3 0 96 14.3 96 32s14.3 32 32 32L128 215.5 7.5 426.3C2.6 435 0 444.7 0 454.7 0 486.4 25.6 512 57.3 512l333.4 0c31.6 0 57.3-25.6 57.3-57.3 0-10-2.6-19.8-7.5-28.4L320 215.5 320 64c17.7 0 32-14.3 32-32S337.7 0 320 0L288 0z"/>
    </g>
    <text x="366" y="431" text-anchor="middle" fill="white">Ball Sort</text>

    <!-- Bubble Pop pill -->
    <rect x="454" y="404" width="162" height="44" rx="22" fill="rgba(236,72,153,0.3)" stroke="#ec4899" stroke-width="1.5"/>
    <g transform="translate(474,426) scale(0.032) translate(-256,-256)" fill="#f9a8d4">
      <path d="M448 256a192 192 0 1 0 -384 0 192 192 0 1 0 384 0zM0 256a256 256 0 1 1 512 0 256 256 0 1 1 -512 0zm256 80a80 80 0 1 0 0-160 80 80 0 1 0 0 160zm0-224a144 144 0 1 1 0 288 144 144 0 1 1 0-288zM224 256a32 32 0 1 1 64 0 32 32 0 1 1 -64 0z"/>
    </g>
    <text x="535" y="431" text-anchor="middle" fill="white">Bubble Pop</text>

    <!-- Cascade pill -->
    <rect x="96" y="464" width="148" height="44" rx="22" fill="rgba(16,185,129,0.3)" stroke="#10b981" stroke-width="1.5"/>
    <g transform="translate(116,486) scale(0.032) translate(-256,-256)" fill="#6ee7b7">
      <path d="M284-1.3c-17.3-10-38.7-10-56 0L143.8 47.3c-17.3 10-28 28.5-28 48.5l0 101.9-88.3 51c-17.3 10-28 28.5-28 48.5l0 97.3c0 20 10.7 38.5 28 48.5l84.3 48.6c17.3 10 38.7 10 56 0l88.3-51 88.3 51c17.3 10 38.7 10 56 0L484.5 443c17.3-10 28-28.5 28-48.5l0-97.3c0-20-10.7-38.5-28-48.5l-88.3-51 0-101.9c0-20-10.7-38.5-28-48.5L284-1.3z"/>
    </g>
    <text x="170" y="491" text-anchor="middle" fill="white">Cascade</text>

    <!-- Tower Defense pill -->
    <rect x="258" y="464" width="202" height="44" rx="22" fill="rgba(168,85,247,0.3)" stroke="#a855f7" stroke-width="1.5"/>
    <g transform="translate(278,486) scale(0.032) translate(-256,-256)" fill="#d8b4fe">
      <path d="M256 0c4.6 0 9.2 1 13.4 2.9L457.8 82.8c22 9.3 38.4 31 38.3 57.2-.5 99.2-41.3 280.7-213.6 363.2-16.7 8-36.1 8-52.8 0-172.4-82.5-213.1-264-213.6-363.2-.1-26.2 16.3-47.9 38.3-57.2L242.7 2.9C246.9 1 251.4 0 256 0z"/>
    </g>
    <text x="359" y="491" text-anchor="middle" fill="white">Tower Defense</text>

    <!-- Colour Game pill -->
    <rect x="474" y="464" width="162" height="44" rx="22" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5"/>
    <g transform="translate(494,486) scale(0.028) translate(-288,-256)" fill="#fed7aa">
      <path d="M480.5 10.3L259.1 158c-29.1 19.4-47.6 50.9-50.6 85.3 62.3 12.8 111.4 61.9 124.3 124.3 34.5-3 65.9-21.5 85.3-50.6L565.7 95.5c6.7-10.1 10.3-21.9 10.3-34.1 0-33.9-27.5-61.4-61.4-61.4-12.1 0-24 3.6-34.1 10.3zM288 400c0-61.9-50.1-112-112-112S64 338.1 64 400c0 3.9 .2 7.8 .6 11.6 1.8 17.5-10.2 36.4-27.8 36.4L32 448c-17.7 0-32 14.3-32 32s14.3 32 32 32l144 0c61.9 0 112-50.1 112-112z"/>
    </g>
    <text x="555" y="491" text-anchor="middle" fill="white">Colour Game</text>
  </g>

  <!-- Bottom tagline -->
  <text x="96" y="587" font-family="'Inter', system-ui, sans-serif" font-size="22" fill="rgba(255,255,255,0.4)">No accounts. No ads. Just games.</text>
</svg>
