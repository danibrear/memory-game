<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#4a1942"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Controller body -->
  <rect x="10" y="22" width="44" height="22" rx="11" fill="url(#accent)"/>
  <!-- Left grip -->
  <rect x="10" y="33" width="13" height="13" rx="6" fill="url(#accent)"/>
  <!-- Right grip -->
  <rect x="41" y="33" width="13" height="13" rx="6" fill="url(#accent)"/>
  <!-- D-pad horizontal -->
  <rect x="16" y="30" width="10" height="4" rx="2" fill="#1e1b4b"/>
  <!-- D-pad vertical -->
  <rect x="19" y="27" width="4" height="10" rx="2" fill="#1e1b4b"/>
  <!-- Buttons -->
  <circle cx="45" cy="27" r="2" fill="#f87171"/>
  <circle cx="50" cy="32" r="2" fill="#4ade80"/>
  <circle cx="40" cy="32" r="2" fill="#60a5fa"/>
  <circle cx="45" cy="37" r="2" fill="#facc15"/>
  <!-- Center buttons -->
  <rect x="26" y="30" width="4" height="3" rx="1.5" fill="rgba(255,255,255,0.4)"/>
  <rect x="31" y="30" width="4" height="3" rx="1.5" fill="rgba(255,255,255,0.4)"/>
</svg>
